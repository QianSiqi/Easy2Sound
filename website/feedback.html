<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
    <title>Easy2Sound-feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .nav {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            padding: 12px 24px;
            display: inline-block;
        }
        .content {
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 48px;
            color: #fff;
            background-color: #4a90e2;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .feedback-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            margin-top: 30px;
        }
        .input-container {
            display: flex;
        }
        .feedback-input {
            flex: 1;
            padding: 18px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px 0 0 8px;
        }
        .submit-btn {
            background: #4a90e2;
            color: white;
            border: none;
            width: 140px;
            font-size: 18px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
        }
        .notice {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">主页</a>
    <a href="down.html">下载</a>
    <a href="details.html">详细介绍</a>
    <a href="feedback.html">反馈问题</a>
    <a href="love.html">感动E2S的10大人物</a>
    <a href="donation.html">投喂</a>
    <a href="yuandaima.html">源代码</a>
</div>

<div class="content">
    <h1>Easy2Sound 意见反馈</h1>
    <div class="feedback-form">
        <div class="input-container">
            <input type="text" class="feedback-input" placeholder="请输入您的宝贵意见...">
            <button class="submit-btn">提交反馈</button>
        </div>
        <div class="notice">
            <p>1. 您的意见将存储在 JSONBin 云端</p>
            <p>2. 请尽量详细描述问题</p>
            <p>3. 我们会定期查看</p>
        </div>
    </div>
</div>

<script>
    // ========== 请替换成你的 JSONBin 信息 ==========
    const JSONBIN_BIN_ID = "69b6a3e2aa77b81da9e7df6c"; // 例如 "66e6d2f1e024fd0d3f123456"
    const JSONBIN_API_KEY = "$2a$10$ZFc5L2RPCj9xB0IE2HeopeUFjvLhnkyLZ7VRx.MWmOqBa69Ueokc6"; // 例如 "$2a$10$..."

    function formatDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const i = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        return y + m + d + h + i + s;
    }

    async function submitFeedback() {
        const input = document.querySelector('.feedback-input');
        const btn = document.querySelector('.submit-btn');
        const text = input.value.trim();

        if (!text) {
            alert('请输入反馈内容！');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            // 1. 先获取当前 Bin 数据
            const getRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                method: 'GET',
                headers: {
                    'X-Master-Key': JSONBIN_API_KEY
                }
            });
            const getData = await getRes.json();
            const currentFeedbacks = getData.record.feedbacks || [];

            // 2. 追加新反馈
            const newFeedback = {
                timestamp: formatDateTime(),
                content: text,
                userAgent: navigator.userAgent // 可选：记录浏览器信息
            };
            const updatedFeedbacks = [...currentFeedbacks, newFeedback];

            // 3. 更新 Bin 数据
            const updateRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY
                },
                body: JSON.stringify({ feedbacks: updatedFeedbacks })
            });

            if (!updateRes.ok) throw new Error('存储失败');
            
            alert('反馈提交成功！已存储到云端。');
            input.value = '';
        } catch (e) {
            console.error(e);
            alert('提交失败：' + e.message + '\n请检查网络或 JSONBin 配置');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    document.querySelector('.submit-btn').addEventListener('click', submitFeedback);
    document.querySelector('.feedback-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') submitFeedback();
    });
</script>

</body>
</html>
