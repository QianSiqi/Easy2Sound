<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Easy2Sound-WTF</title>
    <link rel="stylesheet" href="导航栏.css">
    <style>
        /* 核心：导航栏容器 - 让文字居中 + 登录入口靠右 */
        .nav-container {
            display: flex;
            justify-content: center;  /* 导航链接居中 */
            align-items: center;
            position: relative;       /* 为右上角登录入口做定位父级 */
            padding: 0 20px;
        }

        .nav {
            display: flex;
            gap: 10px;  /* 链接之间的间距 */
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            padding: 12px 24px;
            display: inline-block;
        }

        /* 右上角用户信息区域 - 固定在最右侧 */
        .user-info {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            color: white;
            gap: 15px;
        }

        /* 头像框 */
        .avatar-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #667eea;
            cursor: pointer;
            background: #f5f5f5;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-display {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .logout-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-entrance {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 6px 12px;
            background: #667eea;
            border-radius: 4px;
        }

        /* 登录弹窗（文字清晰版） */
        .login-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center;
            z-index: 999;
        }
        .login-modal.active {
            display: flex;
        }

        .modal-container {
            background: white;
            border-radius: 12px;
            width: 100%; max-width: 450px;
            padding: 40px; position: relative;
        }

        .close-modal {
            position: absolute; top:20px; right:20px;
            font-size:24px; cursor:pointer; border:none; background:none;
            color: #333;
        }

        /* 标签切换 */
        .tabs { display: flex; margin-bottom:30px; border-bottom:2px solid #eee; }
        .tab { 
            padding:10px 20px; cursor:pointer; font-weight:600; 
            color:#333;
        }
        .tab.active { color:#667eea; border-bottom:3px solid #667eea; }
        
        .form-section { display: none; }
        .form-section.active { display: block; }

        /* 表单样式（文字清晰） */
        .form-group { margin-bottom:20px; }
        label { 
            display:block; margin-bottom:8px; 
            color: #333;
            font-weight: 600;
            font-size: 15px;
        }
        input { 
            width:100%; padding:12px 15px; 
            border:1px solid #ddd; border-radius:8px; font-size:16px;
            color: #333;
        }
        input::placeholder {
            color: #999;
        }

        .form-btn { 
            width:100%; padding:14px; 
            background:#667eea; color:white;
            border:none; border-radius:8px; font-weight:600; cursor:pointer;
        }

        .message { margin-top:20px; padding:12px; border-radius:8px; text-align:center; display:none; }
        .success { background:#e8f5e9; color:#2e7d32; display:block; }
        .error { background:#ffebee; color:#c62828; display:block; }

        /* 头像设置弹窗 - 新增上传样式 */
        .avatar-setting-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .avatar-setting-modal.active { display:flex; }
        .avatar-setting-container {
            background:white; border-radius:12px;
            max-width:400px; width:100%; padding:30px;
            position:relative;
        }
        .avatar-preview {
            width:120px; height:120px; border-radius:50%;
            margin:0 auto 20px; border:3px solid #667eea; overflow:hidden;
        }
        .avatar-preview-img { width:100%; height:100%; object-fit:cover; }
        .avatar-tips { 
            text-align:center; color:#666;
            margin-bottom:20px;
        }
        /* 新增：文件上传样式 */
        .upload-box {
            margin: 15px 0;
            padding: 15px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-box:hover {
            background: #f8f9ff;
        }
        .upload-text {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 5px;
        }
        #avatarFile {
            display: none;
        }

        /* 内容区 */
        .content-box {
            background:rgba(0,0,0,0.6); border-radius:12px; padding:25px; margin:30px 0; color:white;
        }
        .content-box h1 { margin-top:0; color:white; }
    </style>
</head>
<body>
    <!-- 统一导航栏（延伸两侧+圆角+右上角登录） -->
    <div class="nav-container">
        <div class="nav">
            <a href="index.html">主页</a>
            <a href="down.html">下载</a>
            <a href="details.html">详细介绍</a>
            <a href="feedback.html">反馈问题</a>
            <a href="love.html">感 动 E 2 S 的 1 0 大 人 物</a>
            <a href="donation.html">投喂</a>
            <a href="yuandaima.html">源代码</a>
        </div>
        
        <!-- 右上角用户信息区域 -->
        <div class="user-info" id="userInfo">
            <!-- 未登录状态 -->
            <a href="javascript:void(0)" class="login-entrance" id="loginEntrance">登录/注册</a>
        </div>
    </div>

    <!-- 原有页面内容（保留文字，优化样式） -->
    <div class="content">
        <h1>创始人 テト普照大地</h1>
        <h2>创始人的朋友小猫你可以吃芝士汉堡是个底层开发</h2>
        <h2>Spinglan是网页开发者(提供后期维护)</h2>
        <h2>无尽夏.画画很好看(UI)</h2>
        <h2>Evidence 是模型训练师</h2>
        <h2>还有好多采样组...</h2>
    </div>

    <!-- 登录/注册弹窗（统一功能，新增QQ号输入项） -->
    <div class="login-modal" id="loginModal">
        <div class="modal-container">
            <button class="close-modal" id="closeModal">&times;</button>
            
            <div class="tabs">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>

            <!-- 登录表单 -->
            <div class="form-section active" id="login">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button class="form-btn" id="login-btn">登录</button>
                <div class="message" id="login-message"></div>
            </div>

            <!-- 注册表单（新增QQ号输入项，用于生成头像） -->
            <div class="form-section" id="register">
                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" placeholder="请设置用户名" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="reg-qq">QQ号（自动生成头像）</label>
                    <input type="number" id="reg-qq" placeholder="选填，输入后自动获取QQ头像">
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" placeholder="请设置密码" required>
                </div>
                <button class="form-btn" id="register-btn">注册</button>
                <div class="message" id="register-message"></div>
            </div>
        </div>
    </div>

    <!-- 头像设置弹窗（新增完整DOM） -->
    <div class="avatar-setting-modal" id="avatarSettingModal">
        <div class="avatar-setting-container">
            <button class="close-modal" id="closeAvatarModal">&times;</button>
            <h3 style="text-align:center; color:#333; margin-bottom:20px;">设置头像</h3>
            <div class="avatar-preview">
                <img class="avatar-preview-img" id="avatarPreviewImg" src="https://q1.qlogo.cn/g?b=qq&nk=0&s=160">
            </div>
            <p class="avatar-tips">选择以下方式设置头像（优先使用上传的头像）</p>
            
            <div class="upload-box" id="uploadBox">
                <p class="upload-text">点击上传本地头像（支持jpg/png格式）</p>
                <input type="file" id="avatarFile" accept="image/jpeg,image/png">
            </div>

            <div class="form-group">
                <label>QQ号（自动生成头像）</label>
                <input type="number" id="setting-qq" placeholder="输入QQ号自动生成头像">
            </div>
            <div class="form-group">
                <label>自定义头像URL</label>
                <input type="text" id="setting-avatar-url" placeholder="输入头像图片链接（上传后自动填充）">
            </div>
            <button class="form-btn" id="saveAvatarBtn">保存</button>
            <div class="message" id="avatar-message"></div>
        </div>
    </div>

    <script>
        // ========== 核心配置 ==========
        const API_BASE_URL = 'https://api.easy2sound.xyz';
        const AVATAR_UPLOAD_API = 'https://avater.easy2sound.xyz'; // 头像上传API
        const USER_INFO_KEY = 'easy2sound_user_info'; 
        const DEFAULT_AVATAR = 'https://q1.qlogo.cn/g?b=qq&nk=0&s=160'; // 默认头像

        // ========== 页面加载初始化 ==========
        window.onload = function() {
            initUserInfo();          // 初始化用户信息（含头像渲染）
            initModalClose();        // 初始化弹窗关闭
            initTabSwitch();         // 初始化标签切换
            initLoginRegisterForm(); // 初始化登录/注册
            bindAvatarEvents();      // 绑定头像相关事件（新增核心）
        };

        // ========== 1. 初始化用户信息（补全头像渲染逻辑） ==========
        function initUserInfo() {
            const userInfo = JSON.parse(localStorage.getItem(USER_INFO_KEY));
            const userInfoContainer = document.getElementById('userInfo');
            
            if (userInfo && userInfo.username) {
                // 已登录状态：显示头像框 + 用户名 + 退出按钮
                const avatarUrl = userInfo.avatar || DEFAULT_AVATAR;
                userInfoContainer.innerHTML = `
                    <div class="avatar-box" id="avatarBox">
                        <img src="${avatarUrl}" class="avatar-img">
                    </div>
                    <span class="username-display">欢迎，${userInfo.username}</span>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                `;
                // 绑定退出登录事件
                document.getElementById('logoutBtn').addEventListener('click', logout);
                // 绑定头像框点击事件（打开设置弹窗）
                document.getElementById('avatarBox').addEventListener('click', openAvatarSetting);
            } else {
                // 未登录状态：显示登录/注册入口
                userInfoContainer.innerHTML = `
                    <a href="javascript:void(0)" class="login-entrance" id="loginEntrance">登录/注册</a>
                `;
                // 绑定登录入口点击事件
                document.getElementById('loginEntrance').addEventListener('click', () => {
                    document.getElementById('loginModal').classList.add('active');
                });
            }
        }

        // ========== 2. 退出登录功能 ==========
        function logout() {
            localStorage.removeItem(USER_INFO_KEY);
            alert('退出登录成功！');
            initUserInfo(); // 刷新用户信息显示
        }

        // ========== 3. 初始化弹窗关闭（新增头像弹窗） ==========
        function initModalClose() {
            // 登录弹窗关闭
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('loginModal').classList.remove('active');
            });
            document.getElementById('loginModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('loginModal')) {
                    document.getElementById('loginModal').classList.remove('active');
                }
            });

            // 头像设置弹窗关闭
            document.getElementById('closeAvatarModal').addEventListener('click', () => {
                document.getElementById('avatarSettingModal').classList.remove('active');
            });
            document.getElementById('avatarSettingModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('avatarSettingModal')) {
                    document.getElementById('avatarSettingModal').classList.remove('active');
                }
            });
        }

        // ========== 4. 标签切换逻辑 ==========
        function initTabSwitch() {
            const tabs = document.querySelectorAll('.tab');
            const sections = document.querySelectorAll('.form-section');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    sections.forEach(s => s.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }

        // ========== 5. 消息提示函数 ==========
        function showMessage(elementId, text, isSuccess) {
            const message = document.getElementById(elementId);
            message.textContent = text;
            message.className = 'message ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => message.className = 'message', 3000);
        }

        // ========== 6. 登录/注册（新增QQ号传参） ==========
        function initLoginRegisterForm() {
            // 登录功能
            document.getElementById('login-btn').addEventListener('click', async () => {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value.trim();

                if (!username || !password) {
                    showMessage('login-message', '请输入用户名和密码', false);
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await response.json();

                    if (data.ok) {
                        localStorage.setItem(USER_INFO_KEY, JSON.stringify(data.user));
                        showMessage('login-message', `登录成功！欢迎你，${data.user.username}`, true);
                        setTimeout(() => {
                            document.getElementById('loginModal').classList.remove('active');
                            initUserInfo();
                        }, 1500);
                    } else {
                        showMessage('login-message', data.error || '登录失败', false);
                    }
                } catch (error) {
                    showMessage('login-message', '网络错误，请检查连接', false);
                }
            });

            // 注册功能（传QQ号）
            document.getElementById('register-btn').addEventListener('click', async () => {
                const username = document.getElementById('reg-username').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const qq = document.getElementById('reg-qq').value.trim();
                const password = document.getElementById('reg-password').value.trim();

                if (!username || !email || !password) {
                    showMessage('register-message', '请填写用户名、邮箱和密码', false);
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password, qq })
                    });
                    const data = await response.json();

                    if (data.ok) {
                        showMessage('register-message', '注册成功！', true);
                        setTimeout(() => document.querySelectorAll('.tab')[0].click(), 1500);
                    } else {
                        showMessage('register-message', data.error || '注册失败', false);
                    }
                } catch (error) {
                    showMessage('register-message', '网络错误，请检查连接', false);
                }
            });
        }

        // ========== 7. 头像核心逻辑（新增） ==========
        function bindAvatarEvents() {
            // 打开头像设置弹窗
            window.openAvatarSetting = function() {
                const user = JSON.parse(localStorage.getItem(USER_INFO_KEY));
                if (!user) {
                    showMessage('avatar-message', '请先登录', false);
                    return;
                }
                const modal = document.getElementById('avatarSettingModal');
                const previewImg = document.getElementById('avatarPreviewImg');
                const qqInput = document.getElementById('setting-qq');
                const urlInput = document.getElementById('setting-avatar-url');

                // 初始化弹窗内容
                previewImg.src = user.avatar || DEFAULT_AVATAR;
                qqInput.value = user.qq || '';
                urlInput.value = user.avatar || '';

                // QQ号实时生成头像
                qqInput.oninput = () => {
                    const qq = qqInput.value.trim();
                    if (qq) {
                        const qqAvatar = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=160`;
                        previewImg.src = qqAvatar;
                        urlInput.value = qqAvatar;
                    }
                };

                // URL实时预览
                urlInput.oninput = () => {
                    const url = urlInput.value.trim();
                    if (url) previewImg.src = url;
                };

                modal.classList.add('active');
            };

            // 头像上传
            const uploadBox = document.getElementById('uploadBox');
            const avatarFile = document.getElementById('avatarFile');
            const previewImg = document.getElementById('avatarPreviewImg');
            const urlInput = document.getElementById('setting-avatar-url');

            uploadBox.addEventListener('click', () => avatarFile.click());
            avatarFile.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 校验文件
                const validTypes = ['image/jpeg', 'image/png'];
                if (!validTypes.includes(file.type)) {
                    showMessage('avatar-message', '仅支持jpg/png格式', false);
                    return;
                }
                if (file.size > 2 * 1024 * 1024) {
                    showMessage('avatar-message', '图片不超过2MB', false);
                    return;
                }

                // 上传文件
                const formData = new FormData();
                formData.append('avatar', file);
                const user = JSON.parse(localStorage.getItem(USER_INFO_KEY));
                formData.append('user_id', user?.id || 'test_user_001');

                try {
                    showMessage('avatar-message', '正在上传...', true);
                    const response = await fetch(AVATAR_UPLOAD_API, {
                        method: 'POST',
                        body: formData,
                        cache: 'no-cache',
                        mode: 'cors'
                    });
                    const data = await response.json();

                    if (response.ok && data.success) {
                        previewImg.src = data.url;
                        urlInput.value = data.url;
                        showMessage('avatar-message', '上传成功！', true);
                    } else {
                        showMessage('avatar-message', `上传失败：${data.message || '未知错误'}`, false);
                    }
                } catch (error) {
                    showMessage('avatar-message', `上传失败：${error.message}`, false);
                }
            });

            // 保存头像设置
            document.getElementById('saveAvatarBtn').addEventListener('click', async () => {
                const user = JSON.parse(localStorage.getItem(USER_INFO_KEY));
                if (!user) {
                    showMessage('avatar-message', '请先登录', false);
                    return;
                }
                const qq = document.getElementById('setting-qq').value.trim();
                const avatar = document.getElementById('setting-avatar-url').value.trim();

                if (!qq && !avatar) {
                    showMessage('avatar-message', '请输入QQ号或头像URL', false);
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/update-user-info`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id, qq, avatar })
                    });
                    const data = await response.json();

                    if (data.ok) {
                        user.qq = data.user.qq;
                        user.avatar = data.user.avatar;
                        localStorage.setItem(USER_INFO_KEY, JSON.stringify(user));
                        showMessage('avatar-message', '头像保存成功！', true);
                        setTimeout(() => {
                            document.getElementById('avatarSettingModal').classList.remove('active');
                            initUserInfo();
                        }, 1000);
                    } else {
                        showMessage('avatar-message', data.error || '保存失败', false);
                    }
                } catch (error) {
                    showMessage('avatar-message', '网络错误，请检查连接', false);
                }
            });
        }
    </script>
</body>
</html>
