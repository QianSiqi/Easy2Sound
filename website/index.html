<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy2Sound-主页</title>
    <link rel="stylesheet" href="导航栏.css">
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* 导航栏增强样式（兼容原有导航栏.css） */
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            display: flex;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            padding: 12px 24px;
            display: inline-block;
        }

        /* 右上角用户信息样式 */
        .user-info {
            display: flex;
            align-items: center;
            color: white;
            gap: 15px;
            padding: 12px 24px;
        }

        .username-display {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .logout-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #5a6edb;
        }

        .login-entrance {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 6px 12px;
            background: #667eea;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .login-entrance:hover {
            background: #5a6edb;
        }

        /* 登录弹窗样式 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .login-modal.active {
            display: flex;
        }

        .modal-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #c62828;
        }

        /* 登录/注册标签样式 */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form-btn:hover {
            background: #5a6edb;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        /* 主页内容样式 */
        .content {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .content h1 {
            font-size: 48px;
            color: #4a90e2;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <!-- 导航栏（包含右上角用户信息） -->
    <div class="nav-container">
        <div class="nav">
            <a href="index.html">主页</a>
            <a href="down.html">下载</a>
            <a href="details.html">详细介绍</a>
            <a href="feedback.html">反馈问题</a>
            <a href="love.html">感 动 E 2 S 的 1 0 大 人 物</a>
            <a href="donation.html">投喂</a>
            <a href="yuandaima.html">源代码</a>
        </div>
        
        <!-- 右上角用户信息区域 -->
        <div class="user-info" id="userInfo">
            <!-- 未登录状态 -->
            <a href="javascript:void(0)" class="login-entrance" id="loginEntrance">登录/注册</a>
        </div>
    </div>

    <!-- 主页内容 -->
    <div class="content">
        <h1>欢迎来到Easy2Sound官网</h1>
        <p>一站式音频工具平台，满足你的所有音频处理需求</p>
    </div>

    <!-- 登录/注册弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="modal-container">
            <span class="close-modal" id="closeModal">&times;</span>
            
            <div class="tabs">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>

            <!-- 登录表单 -->
            <div class="form-section active" id="login">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button class="form-btn" id="login-btn">登录</button>
                <div class="message" id="login-message"></div>
            </div>

            <!-- 注册表单 -->
            <div class="form-section" id="register">
                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" placeholder="请设置用户名" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">邮箱</label>
                    <input type="email" id="reg-email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" placeholder="请设置密码" required>
                </div>
                <button class="form-btn" id="register-btn">注册</button>
                <div class="message" id="register-message"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== JSONBin 配置（替换成你自己的！） ==========
        const JSONBIN_BIN_ID = "69b6a3e2aa77b81da9e7df6c"; // 你的用户数据Bin ID
        const JSONBIN_API_KEY = "$2a$10$ZFc5L2RPCj9xB0IE2HeopeUFjvLhnkyLZ7VRx.MWmOqBa69Ueokc6"; // 你的Master Key
        const USER_INFO_KEY = 'easy2sound_user_info'; // localStorage存储用户信息的key

        // ========== 页面加载时初始化 ==========
        window.onload = function() {
            initUserInfo();
            initLoginModal();
            initLoginRegisterForm();
        };

        // ========== 初始化用户信息显示 ==========
        function initUserInfo() {
            const userInfo = JSON.parse(localStorage.getItem(USER_INFO_KEY));
            const userInfoContainer = document.getElementById('userInfo');
            
            if (userInfo && userInfo.username) {
                // 已登录状态：显示用户名 + 退出按钮
                userInfoContainer.innerHTML = `
                    <span class="username-display">欢迎，${userInfo.username}</span>
                    <button class="logout-btn" id="logoutBtn">退出登录</button>
                `;
                // 绑定退出登录事件
                document.getElementById('logoutBtn').addEventListener('click', logout);
            } else {
                // 未登录状态：显示登录/注册入口
                userInfoContainer.innerHTML = `
                    <a href="javascript:void(0)" class="login-entrance" id="loginEntrance">登录/注册</a>
                `;
                // 绑定登录入口点击事件
                document.getElementById('loginEntrance').addEventListener('click', () => {
                    document.getElementById('loginModal').classList.add('active');
                });
            }
        }

        // ========== 退出登录功能 ==========
        function logout() {
            localStorage.removeItem(USER_INFO_KEY);
            alert('退出登录成功！');
            // 刷新用户信息显示
            initUserInfo();
        }

        // ========== 初始化登录弹窗 ==========
        function initLoginModal() {
            // 关闭弹窗
            document.getElementById('closeModal').addEventListener('click', () => {
                document.getElementById('loginModal').classList.remove('active');
            });
            // 点击弹窗外区域关闭
            document.getElementById('loginModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('loginModal')) {
                    document.getElementById('loginModal').classList.remove('active');
                }
            });
            // 标签切换
            const tabs = document.querySelectorAll('.tab');
            const sections = document.querySelectorAll('.form-section');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    sections.forEach(s => s.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }

        // ========== 显示消息提示 ==========
        function showMessage(elementId, text, isSuccess) {
            const message = document.getElementById(elementId);
            message.textContent = text;
            message.className = 'message ' + (isSuccess ? 'success' : 'error');
            // 3秒后隐藏
            setTimeout(() => {
                message.className = 'message';
            }, 3000);
        }

        // ========== 获取所有用户数据（从JSONBin读取） ==========
        async function getAllUsers() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });
                
                if (!response.ok) {
                    // 如果Bin不存在，初始化空的用户数据
                    if (response.status === 404) {
                        await initUserBin();
                        return [];
                    }
                    throw new Error('获取用户数据失败');
                }
                
                const data = await response.json();
                // 返回用户列表（如果没有则返回空数组）
                return data.record?.users || [];
            } catch (error) {
                console.error('获取用户数据出错：', error);
                return [];
            }
        }

        // ========== 初始化用户数据Bin（首次使用时创建） ==========
        async function initUserBin() {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ users: [] })
                });
            } catch (error) {
                console.error('初始化用户Bin出错：', error);
            }
        }

        // ========== 保存用户数据到JSONBin ==========
        async function saveUsersToBin(users) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ users: users })
                });
                
                if (!response.ok) {
                    throw new Error('保存用户数据失败');
                }
                
                return true;
            } catch (error) {
                console.error('保存用户数据出错：', error);
                return false;
            }
        }

        // ========== 初始化登录/注册表单（真实校验版） ==========
        function initLoginRegisterForm() {
            // 登录功能（真实校验）
            document.getElementById('login-btn').addEventListener('click', async () => {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value.trim();

                // 空值校验
                if (!username || !password) {
                    showMessage('login-message', '请输入用户名和密码', false);
                    return;
                }

                try {
                    // 1. 从JSONBin获取所有用户
                    const users = await getAllUsers();
                    
                    // 2. 查找匹配的用户
                    const matchedUser = users.find(user => 
                        user.username === username && user.password === password
                    );
                    
                    // 3. 校验结果
                    if (matchedUser) {
                        // 登录成功 - 存储用户信息到本地
                        localStorage.setItem(USER_INFO_KEY, JSON.stringify({ 
                            username: matchedUser.username,
                            email: matchedUser.email
                        }));
                        showMessage('login-message', `登录成功！欢迎你，${matchedUser.username}`, true);
                        
                        // 关闭弹窗并刷新用户信息
                        setTimeout(() => {
                            document.getElementById('loginModal').classList.remove('active');
                            initUserInfo();
                        }, 1500);
                    } else {
                        // 登录失败
                        showMessage('login-message', '用户名或密码错误', false);
                    }
                } catch (error) {
                    showMessage('login-message', '登录失败：' + error.message, false);
                    console.error('登录错误:', error);
                }
            });

            // 注册功能（真实保存）
            document.getElementById('register-btn').addEventListener('click', async () => {
                const username = document.getElementById('reg-username').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const password = document.getElementById('reg-password').value.trim();

                // 空值校验
                if (!username || !email || !password) {
                    showMessage('register-message', '请填写所有信息', false);
                    return;
                }

                try {
                    // 1. 从JSONBin获取所有用户
                    const users = await getAllUsers();
                    
                    // 2. 检查用户名是否已存在
                    const userExists = users.some(user => user.username === username);
                    if (userExists) {
                        showMessage('register-message', '用户名已存在，请更换', false);
                        return;
                    }
                    
                    // 3. 检查邮箱是否已存在
                    const emailExists = users.some(user => user.email === email);
                    if (emailExists) {
                        showMessage('register-message', '该邮箱已注册，请更换', false);
                        return;
                    }
                    
                    // 4. 创建新用户
                    const newUser = {
                        username: username,
                        email: email,
                        password: password,
                        registerTime: new Date().toISOString()
                    };
                    
                    // 5. 保存到JSONBin
                    const saveSuccess = await saveUsersToBin([...users, newUser]);
                    if (saveSuccess) {
                        showMessage('register-message', '注册成功！请登录', true);
                        // 切换到登录标签并填充用户名
                        setTimeout(() => {
                            document.querySelectorAll('.tab')[0].click();
                            document.getElementById('login-username').value = username;
                        }, 1500);
                    } else {
                        showMessage('register-message', '注册失败，请重试', false);
                    }
                } catch (error) {
                    showMessage('register-message', '注册失败：' + error.message, false);
                    console.error('注册错误:', error);
                }
            });
        }
    </script>
</body>
</html>
