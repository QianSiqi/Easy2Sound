<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Easy2Sound-details</title>
    <link rel="stylesheet" href="导航栏.css">
    <style>
        .nav {
            display: flex;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            padding: 12px 24px;
            display: inline-block;
        }

        .user-info {
            display: flex;
            align-items: center;
            color: white;
            gap: 15px;
            padding: 12px 24px;
        }

        .avatar-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #667eea;
            cursor: pointer;
            background: #f5f5f5;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-display {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
        }

        .logout-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-entrance {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 6px 12px;
            background: #667eea;
            border-radius: 4px;
        }

        .login-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center;
            z-index: 999;
        }

        .login-modal.active {
            display: flex;
        }

        .modal-container {
            background: white; border-radius: 12px;
            width: 100%; max-width: 450px;
            padding: 40px; position: relative;
        }

        .close-modal {
            position: absolute; top:20px; right:20px;
            font-size:24px; cursor:pointer; border:none; background:none;
        }

        .tabs { display: flex; margin-bottom:30px; border-bottom:2px solid #eee; }
        .tab { padding:10px 20px; cursor:pointer; font-weight:600; color:#666; }
        .tab.active { color:#667eea; border-bottom:3px solid #667eea; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom:20px; }
        label { display:block; margin-bottom:8px; }
        input { width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:8px; font-size:16px; }
        .form-btn { width:100%; padding:14px; background:#667eea; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
        .message { margin-top:20px; padding:12px; border-radius:8px; text-align:center; display:none; }
        .success { background:#e8f5e9; color:#2e7d32; display:block; }
        .error { background:#ffebee; color:#c62828; display:block; }

        .avatar-setting-modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .avatar-setting-modal.active { display:flex; }
        .avatar-setting-container {
            background:white; border-radius:12px;
            max-width:400px; width:100%; padding:30px;
            position:relative;
        }
        .avatar-preview {
            width:120px; height:120px; border-radius:50%;
            margin:0 auto 20px; border:3px solid #667eea; overflow:hidden;
        }
        .avatar-preview-img { width:100%; height:100%; object-fit:cover; }
        .avatar-tips { text-align:center; color:#666; margin-bottom:20px; }

        .content-box {
            background:rgba(0,0,0,0.6); border-radius:12px; padding:25px; margin:30px 0; color:white;
        }
        .content-box h1 { margin-top:0; color:white; }
    </style>
</head>
<body>

<div class="nav-container">
    <div class="nav">
        <a href="index.html">主页</a>
        <a href="down.html">下载</a>
        <a href="details.html">详细介绍</a>
        <a href="feedback.html">反馈问题</a>
        <a href="love.html">感 动 E 2 S 的 1 0 大 人 物</a>
        <a href="donation.html">投喂</a>
        <a href="yuandaima.html">源代码</a>
    </div>
    <div class="user-info" id="userInfo"></div>
</div>

<div class="content-box">
    <h1>Easy2Sound 详细介绍</h1>
    <p>Easy2Sound 是一款简单易用的虚拟歌姬合成工具(暂时只支持UTAU，Open UTAU)软件离线状态保持本地运作，除下载插件外，无需用网。</p>
    <p>软件支持本地导入导出,无需复杂设置,适合新手使用。</p>
</div>

<!-- 登录弹窗 -->
<div class="login-modal" id="loginModal">
    <div class="modal-container">
        <button class="close-modal" id="closeModal">&times;</button>
        <div class="tabs">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <div class="form-section active" id="login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password">
            </div>
            <button class="form-btn" id="login-btn">登录</button>
            <div class="message" id="login-message"></div>
        </div>

        <div class="form-section" id="register">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="reg-username">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="reg-email">
            </div>
            <div class="form-group">
                <label>QQ号（自动生成头像）</label>
                <input type="number" id="reg-qq">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="reg-password">
            </div>
            <button class="form-btn" id="register-btn">注册</button>
            <div class="message" id="register-message"></div>
        </div>
    </div>
</div>

<!-- 头像设置弹窗 -->
<div class="avatar-setting-modal" id="avatarSettingModal">
    <div class="avatar-setting-container">
        <button class="close-modal" id="closeAvatarModal">&times;</button>
        <h3 style="text-align:center;">设置头像</h3>
        <div class="avatar-preview">
            <img class="avatar-preview-img" id="avatarPreviewImg">
        </div>
        <p class="avatar-tips">填写QQ号自动获取头像，或填写URL</p>
        <div class="form-group">
            <label>QQ号</label>
            <input type="number" id="setting-qq">
        </div>
        <div class="form-group">
            <label>自定义头像URL</label>
            <input type="text" id="setting-avatar-url">
        </div>
        <button class="form-btn" id="saveAvatarBtn">保存</button>
        <div class="message" id="avatar-message"></div>
    </div>
</div>

<script>
const API_BASE = 'https://api.easy2sound.xyz';
const USER_KEY = 'easy2sound_user_info';
const DEFAULT_AVATAR = 'https://q1.qlogo.cn/g?b=qq&nk=0&s=160';

window.onload = () => {
    renderUserBar();
    bindModalEvents();
    bindTabSwitch();
    bindLoginRegister();
    bindAvatarBoxClick(); // 👉 修复点头像没反应
};

// ======================================
// 渲染用户栏（登录/头像/退出）
// ======================================
function renderUserBar() {
    const user = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
    const el = document.getElementById('userInfo');
    if (!user) {
        el.innerHTML = `<a href="javascript:" class="login-entrance" id="goLogin">登录/注册</a>`;
        document.getElementById('goLogin').onclick = () => {
            document.getElementById('loginModal').classList.add('active');
        };
        return;
    }
    const avatar = user.avatar || DEFAULT_AVATAR;
    el.innerHTML = `
        <div class="avatar-box" id="avatarBox">
            <img src="${avatar}" class="avatar-img">
        </div>
        <span class="username-display">欢迎，${user.username}</span>
        <button class="logout-btn" id="logoutBtn">退出</button>
    `;
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem(USER_KEY);
        alert('已退出');
        renderUserBar();
    };
}

// ======================================
// 👉 头像点击（修复核心：用事件委托）
// ======================================
function bindAvatarBoxClick() {
    document.body.addEventListener('click', (e) => {
        if (e.target.closest('#avatarBox')) {
            openAvatarSetting();
        }
    });
}

// ======================================
// 打开头像设置
// ======================================
function openAvatarSetting() {
    const user = JSON.parse(localStorage.getItem(USER_KEY));
    if (!user) return;
    const m = document.getElementById('avatarSettingModal');
    const prev = document.getElementById('avatarPreviewImg');
    const qq = document.getElementById('setting-qq');
    const url = document.getElementById('setting-avatar-url');

    prev.src = user.avatar || DEFAULT_AVATAR;
    qq.value = user.qq || '';
    url.value = user.avatar || '';

    // 实时预览
    qq.oninput = () => {
        const v = qq.value.trim();
        if (v) {
            const qavatar = `https://q1.qlogo.cn/g?b=qq&nk=${v}&s=160`;
            prev.src = qavatar;
            url.value = qavatar;
        }
    };
    url.oninput = () => {
        if (url.value) prev.src = url.value;
    };

    m.classList.add('active');
}

// ======================================
// 弹窗关闭
// ======================================
function bindModalEvents() {
    document.getElementById('closeModal').onclick = () => {
        document.getElementById('loginModal').classList.remove('active');
    };
    document.getElementById('closeAvatarModal').onclick = () => {
        document.getElementById('avatarSettingModal').classList.remove('active');
    };
}

// ======================================
// 登录/注册标签切换
// ======================================
function bindTabSwitch() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => {
        t.onclick = () => {
            tabs.forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            t.classList.add('active');
            document.getElementById(t.dataset.tab).classList.add('active');
        };
    });
}

// ======================================
// 登录 & 注册
// ======================================
function bindLoginRegister() {
    // 登录
    document.getElementById('login-btn').onclick = async () => {
        const u = document.getElementById('login-username').value.trim();
        const p = document.getElementById('login-password').value.trim();
        if (!u || !p) return showMsg('login-message', '请输入账号密码', false);
        try {
            const r = await fetch(API_BASE + '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const d = await r.json();
            if (d.ok) {
                localStorage.setItem(USER_KEY, JSON.stringify(d.user));
                showMsg('login-message', '登录成功', true);
                setTimeout(() => {
                    document.getElementById('loginModal').classList.remove('active');
                    renderUserBar();
                }, 1000);
            } else {
                showMsg('login-message', d.error, false);
            }
        } catch (e) { showMsg('login-message', '网络错误', false); }
    };

    // 注册
    document.getElementById('register-btn').onclick = async () => {
        const u = document.getElementById('reg-username').value.trim();
        const e = document.getElementById('reg-email').value.trim();
        const q = document.getElementById('reg-qq').value.trim();
        const p = document.getElementById('reg-password').value.trim();
        if (!u || !e || !p) return showMsg('register-message', '请填完', false);
        try {
            const res = await fetch(API_BASE + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, email: e, password: p, qq: q })
            });
            const d = await res.json();
            if (d.ok) {
                showMsg('register-message', '注册成功！', true);
                setTimeout(() => document.querySelectorAll('.tab')[0].click(), 1000);
            } else {
                showMsg('register-message', d.error, false);
            }
        } catch (err) { showMsg('register-message', '网络错误', false); }
    };

    // 保存头像
    document.getElementById('saveAvatarBtn').onclick = async () => {
        const user = JSON.parse(localStorage.getItem(USER_KEY));
        if (!user) return;
        const qq = document.getElementById('setting-qq').value.trim();
        const avatar = document.getElementById('setting-avatar-url').value.trim();
        try {
            const r = await fetch(API_BASE + '/update-user-info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, qq, avatar })
            });
            const d = await r.json();
            if (d.ok) {
                user.qq = d.user.qq;
                user.avatar = d.user.avatar;
                localStorage.setItem(USER_KEY, JSON.stringify(user));
                showMsg('avatar-message', '保存成功', true);
                setTimeout(() => {
                    document.getElementById('avatarSettingModal').classList.remove('active');
                    renderUserBar();
                }, 1000);
            } else {
                showMsg('avatar-message', d.error || '失败', false);
            }
        } catch (e) { showMsg('avatar-message', '网络错误', false); }
    };
}

function showMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + (ok ? 'success' : 'error');
    setTimeout(() => el.className = 'message', 3000);
}
</script>
</body>
</html>
